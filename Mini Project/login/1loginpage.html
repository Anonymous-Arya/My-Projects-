<body>
 <h3>
    Login Page
 </h3>
 <div id="outer">
   <div id="inner">
      <p class="loginpara" style="font-size: 20px;">Enter Name</p>
      <input type="text" id="fname" placeholder="First name..">
      <br>
      <input type="text" id="mname" placeholder="Middle name..">
      <br>
      <input type="text" id="lname"placeholder="Last name..">
      <br>
      <p class="loginpara" style="font-size: 20px;">Enter email</p>
      <input type="email" placeholder="xyz@gmail.com" class="last">
      <p class="loginpara" style="font-size: 20px;">Enter Password </p>
      <input type="password" placeholder="password..."  class="last">
  
   </div>
 </div>
</body>
