<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>calculator</title>
    <link rel="stylesheet" href="cal.css" />
    <script src="cal.js"></script>
  </head>
  <body>
    <div class="heading"><h2>calculator</h2></div>
    <div class="calculator">
      <div class="input">
        <input type="text" placeholder="Enter First No." class="inputno"id="fstno"autocomplete="off"/>
      <input type="text" placeholder="Enter Second No."class="inputno"id="scndno"autocomplete="off"/>
      <input type="text" placeholder="Answer" class="inputno" id="result"  autocomplete="off"/>
      </div>
      <div class="btn">
        <div id="add" class="oprbtn" onclick="add()">Add</div>
        <div id="sub" class="oprbtn" onclick="sub()">Sub</div>
        <div id="mul" class="oprbtn" onclick="mul()">Mul</div>
        <div id="div" class="oprbtn" onclick="div()">Div</div>
        <div id="Clr" class="oprbtn" onclick="remove()">Clear</div>
      </div>
    </div>
  </body>
</html>
