<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>weather website</title>
    <link rel="stylesheet" href="weather.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
  </head>
  <body>
    <!--HERE IS THE HEADING OF THE APP-->
    <h2 class="heading">Weather App</h2>
    <!--HERE WE ARE STARTING THE MAIN CONTAINER-->
    <div class="main">
      <!--search container-->
      <div class="search">
        <div id="search-bar">
          <input type="text" placeholder="Search..." spellcheck="false" />
        </div>
        <div id="search-icon">
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
      </div>
      <!--weather indicator-->
      <div class="weather-indicator">
        <p class="indicator-text">Weather...!</p>
      </div>
      <!--image container-->
      <div class="image">
        <img src="cloudy.png" alt="" />
      </div>
      <!--adding name of the location-->
      <div class="area-location">
        <p id="location">Location...!</p>
      </div>
      <!--temperature and location-->
      <div class="temp location">
        <p class="temperature">27°C</p>
      </div>
      <!-- humidity and air-flow-->
      <div class="humidity-wind-speed">
        <div class="humidity">
          <img src="humidity icon.png " alt="" />
        </div>
        <div class="humidity-count">
          <p id="humid">11</p>
          <p>%</p>
        </div>

        <div class="wind">
          <img src="wind icon.png" alt="" />
        </div>
        <div class="wind-count">
          <p id="wind-speed">29</p>
          <p>Km/h</p>
        </div>
      </div>
    </div>
    <script src="weather.js"></script>
  </body>
</html>
