<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>currency conveter</title>
    <link rel="stylesheet" href="CC.css" />

    <!-- cdn of font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <h2 id="heading">Currency Conveter</h2>
      <!--creating form-->
      <form>
        <div class="amount">
          <p>Enter the Amount</p>
          <input placeholder="100.00" value="" type="text" autocomplete="off" id="enter-amount" />
        </div>
        <div class="dropdown">
          <div class="from">
            <!-- in dropdown we have selcet-from div and in form we have select-->
            <div id="from-text"><p>From</p></div>
            <div id="select-from">
              <img
                src="https://flagsapi.com/US/flat/64.png"
                alt="selectedflag"
              />
              <select name="From" id="from"></select>
            </div>
          </div>

          <div class="exchange-icon">
            <i class="fa-solid fa-right-left"></i>
          </div>
          <!--this is our to div in this we have select-to div-->
          <div class="to">
            <div id="to-text"><p>To</p></div>
            <div id="select-to">
              <img
                src="https://flagsapi.com/IN/flat/64.png"
                alt="selectedflag"
              />
              <select name="To" id="to"></select>
            </div>
          </div>
        </div>
        <div id="convert">
          <button id="btn">Convert</button>
        </div>
        <div id="converted-amount">
          <p>Converted Amount</p>
          <input placeholder="The Amount !" value="" autocomplete="off" type="text" />
        </div>
      </form>
    </div>
    <script src="codes.js"></script>
    <script src="CC.js"></script>
  </body>
</html>
